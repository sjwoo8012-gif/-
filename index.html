<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나만의 홈페이지</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
    background: #fff;
    min-height: 100vh;
    color: #202124;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    display: flex; justify-content: flex-end; align-items: center;
    padding: 12px 24px; gap: 12px;
  }
  .topbar a { font-size:.875rem; color:#202124; text-decoration:none; padding:8px 12px; border-radius:4px; }
  .topbar a:hover { background:#f1f3f4; }
  .avatar {
    width:32px; height:32px; border-radius:50%;
    background:#1a73e8; color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:.875rem; font-weight:500; cursor:pointer;
  }
  .main { flex:1; display:flex; flex-direction:column; align-items:center; padding-top:60px; }
  .logo { font-size:72px; font-weight:700; letter-spacing:-2px; margin-bottom:20px; user-select:none; line-height:1; }
  .g{color:#4285F4}.o1{color:#EA4335}.o2{color:#FBBC05}.g2{color:#4285F4}.l{color:#34A853}.e{color:#EA4335}
  .clock-wrap { font-size:2rem; font-weight:400; color:#5f6368; margin-bottom:24px; letter-spacing:1px; }
  .date-str { font-size:.9rem; color:#5f6368; margin-top:4px; text-align:center; }
  .search-box {
    display:flex; align-items:center;
    width:584px; max-width:90vw;
    border:1px solid #dfe1e5; border-radius:24px;
    padding:10px 20px; gap:12px; background:#fff;
    box-shadow:none; transition:box-shadow .2s, border-color .2s;
    margin-bottom:20px;
  }
  .search-box:hover, .search-box:focus-within {
    box-shadow:0 1px 6px rgba(32,33,36,.28); border-color:rgba(223,225,229,0);
  }
  .search-icon { color:#9aa0a6; flex-shrink:0; }
  .search-box input { flex:1; border:none; outline:none; font-size:1rem; color:#202124; background:transparent; font-family:inherit; }
  .mic-icon { color:#4285F4; cursor:pointer; flex-shrink:0; }
  .search-btns { display:flex; gap:12px; margin-bottom:32px; }
  .search-btns button {
    background:#f8f9fa; border:1px solid #f8f9fa; border-radius:4px;
    color:#3c4043; font-size:.875rem; padding:10px 16px; cursor:pointer;
    font-family:inherit; transition:box-shadow .2s, border-color .2s;
  }
  .search-btns button:hover { box-shadow:0 1px 3px rgba(32,33,36,.28); border-color:#dadce0; color:#202124; }

  .cards {
    display:flex; gap:14px;
    width:860px; max-width:95vw;
    align-items:flex-start;
    margin-bottom:40px;
  }
  .card {
    flex:1; background:#fff; border:1px solid #dadce0;
    border-radius:8px; padding:16px 18px; transition:box-shadow .2s;
    min-width:0;
  }
  .card:hover { box-shadow:0 1px 6px rgba(32,33,36,.28); }
  .card-title {
    font-size:.7rem; font-weight:500; text-transform:uppercase;
    letter-spacing:1.2px; color:#5f6368; margin-bottom:12px;
    display:flex; align-items:center; gap:6px;
  }

  /* 날씨 */
  .w-main { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .w-icon { font-size:2.2rem; }
  .w-temp { font-size:2.2rem; font-weight:400; color:#202124; }
  .w-unit { font-size:1rem; color:#5f6368; }
  .w-desc { font-size:.875rem; color:#5f6368; margin-bottom:10px; }
  .w-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .w-item { background:#f8f9fa; border-radius:6px; padding:7px 10px; }
  .w-label { font-size:.7rem; color:#9aa0a6; }
  .w-val { font-size:.82rem; font-weight:500; color:#202124; }
  #w-status { font-size:.8rem; color:#9aa0a6; padding:10px 0; }

  /* 뉴스 */
  .news-item { padding:9px 0; border-bottom:1px solid #f1f3f4; cursor:pointer; }
  .news-item:last-child { border-bottom:none; }
  .news-item:hover .n-title { color:#1a73e8; }
  .n-badge { font-size:.65rem; font-weight:700; background:#e8f0fe; color:#1a73e8; padding:2px 7px; border-radius:10px; display:inline-block; margin-bottom:3px; }
  .n-title { font-size:.82rem; font-weight:500; color:#202124; line-height:1.4; }
  .n-meta { font-size:.72rem; color:#9aa0a6; margin-top:2px; }
  #news-status { font-size:.8rem; color:#9aa0a6; padding:12px 0; text-align:center; }

  /* 할일 */
  .todo-input-wrap { display:flex; gap:6px; margin-bottom:12px; }
  .todo-input {
    flex:1; border:1px solid #dadce0; border-radius:6px;
    padding:7px 10px; font-size:.82rem; font-family:inherit;
    outline:none; color:#202124; transition:border-color .2s;
  }
  .todo-input:focus { border-color:#1a73e8; }
  .todo-add-btn {
    background:#1a73e8; color:#fff; border:none;
    border-radius:6px; padding:7px 12px; cursor:pointer;
    font-size:1.1rem; line-height:1; transition:background .15s; flex-shrink:0;
  }
  .todo-add-btn:hover { background:#1765cc; }
  .todo-list { display:flex; flex-direction:column; gap:4px; }
  .todo-item {
    display:flex; align-items:center; gap:8px;
    padding:7px 8px; border-radius:6px; transition:background .15s; cursor:default;
  }
  .todo-item:hover { background:#f8f9fa; }
  .todo-check {
    width:16px; height:16px; border:2px solid #dadce0;
    border-radius:50%; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:border-color .2s, background .2s;
  }
  .todo-check.done { background:#34A853; border-color:#34A853; }
  .todo-check.done::after { content:'✓'; color:#fff; font-size:.6rem; font-weight:700; }
  .todo-text { flex:1; font-size:.82rem; color:#202124; transition:color .2s, text-decoration .2s; line-height:1.4; }
  .todo-text.done { text-decoration:line-through; color:#9aa0a6; }
  .todo-del {
    opacity:0; color:#9aa0a6; cursor:pointer; font-size:1rem;
    flex-shrink:0; line-height:1; border:none; background:none;
    padding:2px 4px; border-radius:4px; transition:opacity .15s, color .15s;
  }
  .todo-item:hover .todo-del { opacity:1; }
  .todo-del:hover { color:#EA4335; }
  .todo-empty { font-size:.8rem; color:#9aa0a6; text-align:center; padding:16px 0; }
  .todo-footer {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:10px; padding-top:8px; border-top:1px solid #f1f3f4;
  }
  .todo-count { font-size:.75rem; color:#9aa0a6; }
  .todo-clear-btn {
    font-size:.75rem; color:#EA4335; background:none;
    border:none; cursor:pointer; padding:2px 4px;
    border-radius:4px; font-family:inherit;
  }
  .todo-clear-btn:hover { background:#fce8e6; }

  .refresh-btn {
    margin-top:10px; width:100%; padding:7px;
    border:1px solid #dadce0; border-radius:6px;
    background:#fff; color:#1a73e8; font-size:.78rem;
    font-weight:500; cursor:pointer; font-family:inherit; transition:background .15s;
  }
  .refresh-btn:hover { background:#e8f0fe; }

  .footer {
    background:#f2f2f2; border-top:1px solid #e4e4e4;
    padding:14px 24px; display:flex; justify-content:space-between;
    align-items:center; font-size:.8rem; color:#70757a;
  }
  .footer a { color:#70757a; text-decoration:none; margin:0 12px; }
  .footer a:hover { text-decoration:underline; }
  .spinner {
    display:inline-block; width:14px; height:14px;
    border:2px solid #e8eaed; border-top-color:#1a73e8;
    border-radius:50%; animation:spin .7s linear infinite;
    vertical-align:middle; margin-right:6px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <a href="#">Gmail</a>
  <a href="#">이미지</a>
  <div class="avatar">나</div>
</div>

<div class="main">
  <div class="logo">
    <span class="g">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
  </div>
  <div class="clock-wrap">
    <div id="clock">--:--</div>
    <div class="date-str" id="date-str"></div>
  </div>
  <div class="search-box">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" id="search-input" placeholder="Google 검색 또는 URL 입력" onkeydown="if(event.key==='Enter')doSearch()">
    <svg class="mic-icon" width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </div>
  <div class="search-btns">
    <button onclick="doSearch()">Google 검색</button>
    <button onclick="window.open('https://www.google.com/search?q='+encodeURIComponent(document.getElementById('search-input').value||'I%27m+Feeling+Lucky'),'_blank')">I'm Feeling Lucky</button>
  </div>

  <div class="cards">
    <!-- 날씨 카드 -->
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#1a73e8" d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8-5c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm-1 16.95h2V19.5h-2v2.95zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8z"/></svg>
        날씨
      </div>
      <div id="w-status"><span class="spinner"></span>불러오는 중...</div>
      <div id="w-content" style="display:none">
        <div class="w-main">
          <div class="w-icon" id="w-icon">☀️</div>
          <div><span class="w-temp" id="w-temp">--</span><span class="w-unit">°C</span></div>
        </div>
        <div class="w-desc" id="w-desc">--</div>
        <div class="w-grid">
          <div class="w-item"><div class="w-label">체감</div><div class="w-val" id="w-feel">--</div></div>
          <div class="w-item"><div class="w-label">습도</div><div class="w-val" id="w-humid">--</div></div>
          <div class="w-item"><div class="w-label">풍속</div><div class="w-val" id="w-wind">--</div></div>
          <div class="w-item"><div class="w-label">최저/최고</div><div class="w-val" id="w-range">--</div></div>
        </div>
      </div>
      <button class="refresh-btn" onclick="loadWeather()">새로고침</button>
    </div>

    <!-- 뉴스 카드 -->
    <!-- ⚠️ 뉴스 카드는 Anthropic API 키가 필요합니다. -->
    <!-- 아래 fetch URL의 Authorization 헤더에 본인의 API 키를 추가하세요. -->
    <!-- 예: headers: { 'Content-Type': 'application/json', 'x-api-key': 'sk-ant-...' } -->
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#1a73e8" d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.11 0 2-.89 2-2V5c0-1.11-.89-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"/></svg>
        기술 뉴스
      </div>
      <div id="news-list">
        <div id="news-status"><span class="spinner"></span>AI가 뉴스를 검색 중...</div>
      </div>
      <button class="refresh-btn" onclick="loadNews()">새로고침</button>
    </div>

    <!-- 할일 카드 -->
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24"><path fill="#34A853" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 14l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        오늘의 할일
      </div>
      <div class="todo-input-wrap">
        <input class="todo-input" id="todo-input" placeholder="새 할일 추가..." maxlength="60"
          onkeydown="if(event.key==='Enter')addTodo()">
        <button class="todo-add-btn" onclick="addTodo()">+</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
      <div class="todo-footer">
        <span class="todo-count" id="todo-count">0개 완료</span>
        <button class="todo-clear-btn" onclick="clearDone()">완료 항목 삭제</button>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <span>대한민국</span>
  <div>
    <a href="#">광고</a><a href="#">비즈니스</a>
    <a href="#">개인정보처리방침</a><a href="#">설정</a>
  </div>
</div>

<script>
  // ── 설정 ──────────────────────────────────────────────
  const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE'; // ← 본인의 Anthropic API 키 입력
  // ──────────────────────────────────────────────────────

  // ── 시계 ──
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('date-str').textContent =
      `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── 검색 ──
  function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (q) window.open(`https://www.google.com/search?q=${encodeURIComponent(q)}`, '_blank');
  }

  // ── 날씨 (Open-Meteo, 무료 / 키 불필요) ──
  async function loadWeather() {
    document.getElementById('w-status').innerHTML = '<span class="spinner"></span>불러오는 중...';
    document.getElementById('w-status').style.display = '';
    document.getElementById('w-content').style.display = 'none';
    try {
      const r = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780' +
        '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code' +
        '&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FSeoul'
      );
      const d = await r.json();
      const c = d.current, daily = d.daily, code = c.weather_code;
      const icons = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',53:'🌦',55:'🌧',
        61:'🌧',63:'🌧',65:'🌧',71:'🌨',73:'🌨',75:'❄️',80:'🌦',81:'🌧',82:'⛈',95:'⛈',99:'⛈'};
      const descs = {0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',45:'안개',
        51:'이슬비',53:'이슬비',55:'강한 이슬비',61:'약한 비',63:'비',65:'강한 비',
        71:'약한 눈',73:'눈',75:'강한 눈',80:'소나기',82:'강한 소나기',95:'뇌우',99:'뇌우+우박'};
      document.getElementById('w-icon').textContent = icons[code] || '🌡️';
      document.getElementById('w-temp').textContent = Math.round(c.temperature_2m);
      document.getElementById('w-desc').textContent = `서울 · ${descs[code] || '알 수 없음'}`;
      document.getElementById('w-feel').textContent = Math.round(c.apparent_temperature) + '°C';
      document.getElementById('w-humid').textContent = c.relative_humidity_2m + '%';
      document.getElementById('w-wind').textContent = c.wind_speed_10m + ' m/s';
      document.getElementById('w-range').textContent =
        `${Math.round(daily.temperature_2m_min[0])}/${Math.round(daily.temperature_2m_max[0])}°C`;
      document.getElementById('w-status').style.display = 'none';
      document.getElementById('w-content').style.display = '';
    } catch (e) {
      document.getElementById('w-status').innerHTML = '⚠️ 날씨를 불러올 수 없어요.';
    }
  }
  loadWeather();

  // ── 뉴스 (Anthropic API + Web Search) ──
  async function loadNews() {
    const el = document.getElementById('news-list');
    el.innerHTML = '<div id="news-status"><span class="spinner"></span>AI가 뉴스를 검색 중...</div>';
    try {
      const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ANTHROPIC_API_KEY,        // ← API 키 사용
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          system: `당신은 기술 뉴스 큐레이터입니다. 오늘(${today}) 최신 IT/기술 뉴스 5개를 검색하여 JSON 배열로만 응답하세요. 마크다운 없이 순수 JSON만 출력하세요. 형식: [{"title":"제목","source":"출처","time":"시간"}]`,
          messages: [{ role: 'user', content: `오늘 ${today}의 주요 IT/기술 뉴스 5개를 웹 검색으로 찾아서 JSON으로만 응답해주세요.` }]
        })
      });
      const data = await res.json();
      let jsonStr = '';
      for (const b of data.content) { if (b.type === 'text') { jsonStr = b.text; break; } }
      jsonStr = jsonStr.replace(/```json|```/g, '').trim();
      const news = JSON.parse(jsonStr);
      el.innerHTML = news.map(n => `
        <div class="news-item">
          <span class="n-badge">IT</span>
          <div class="n-title">${n.title}</div>
          <div class="n-meta">${n.source} · ${n.time}</div>
        </div>`).join('');
    } catch (e) {
      el.innerHTML = '<div id="news-status">⚠️ 뉴스를 불러올 수 없어요. API 키를 확인해주세요.</div>';
    }
  }
  loadNews();

  // ── 할일 ──
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');

  function saveTodos() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  function renderTodos() {
    const list = document.getElementById('todo-list');
    if (todos.length === 0) {
      list.innerHTML = '<div class="todo-empty">할일을 추가해보세요 ✨</div>';
    } else {
      list.innerHTML = todos.map((t, i) => `
        <div class="todo-item">
          <div class="todo-check ${t.done ? 'done' : ''}" onclick="toggleTodo(${i})"></div>
          <span class="todo-text ${t.done ? 'done' : ''}">${t.text}</span>
          <button class="todo-del" onclick="deleteTodo(${i})">×</button>
        </div>`).join('');
    }
    const done = todos.filter(t => t.done).length;
    document.getElementById('todo-count').textContent = `${done}/${todos.length}개 완료`;
  }

  function addTodo() {
    const inp = document.getElementById('todo-input');
    const text = inp.value.trim();
    if (!text) return;
    todos.push({ text, done: false });
    inp.value = '';
    saveTodos();
    renderTodos();
  }

  function toggleTodo(i) {
    todos[i].done = !todos[i].done;
    saveTodos();
    renderTodos();
  }

  function deleteTodo(i) {
    todos.splice(i, 1);
    saveTodos();
    renderTodos();
  }

  function clearDone() {
    todos = todos.filter(t => !t.done);
    saveTodos();
    renderTodos();
  }

  renderTodos();

  // 자동 새로고침
  setInterval(loadWeather, 10 * 60 * 1000); // 10분마다
  setInterval(loadNews, 30 * 60 * 1000);    // 30분마다
</script>
